<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>内容创作平台 ·  线框稿</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; color: #1a1a1a; font-family: "Inter", system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; overflow: hidden; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wireframe-kit.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const W = 1280, H = 800;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showLabels": true
}/*EDITMODE-END*/;

function App() {
  const [t, setT] = useTweaks(TWEAK_DEFAULTS);

  const screens = [
    { id: 'home',      label: '工作台',     Comp: HomeV1 },
    { id: 'trends',    label: '热点分析',   Comp: TrendsV1 },
    { id: 'ideas',     label: '选题灵感',   Comp: IdeasV1 },
    { id: 'editor',    label: '编辑器',     Comp: EditorV1 },
    { id: 'publish',   label: '发布管理',   Comp: PublishV1 },
    { id: 'analytics', label: '数据分析',   Comp: AnalyticsV1 },
    { id: 'assets',    label: '素材库',     Comp: AssetsV1 },
  ];

  return (
    <>
      <DesignCanvas>
        <DCSection id="screens" title="内容创作平台 · 线框稿">
          {screens.map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={W} height={H}>
              <s.Comp />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="说明">
          <div style={{ fontFamily: '"Inter", sans-serif', fontSize: 12, lineHeight: 1.6, color: '#5a5048' }}>
            7 个页面 · 统一左侧导航 SaaS 壳。<br/>
            <br/>
            · 滚轮缩放，空格拖动画布<br/>
            · 右上 ⛶ 全屏聚焦<br/>
            · <code style={{ background: '#eee', padding: '0 4px' }}>{'{ 占位 }'}</code> 标记待填充内容
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
